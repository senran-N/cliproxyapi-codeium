name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: dylib
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: dll
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build c-shared plugin
        working-directory: plugin
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../dist
          out="../dist/cliproxy-codeium-${GOOS}-${GOARCH}.${{ matrix.ext }}"
          go build -buildmode=c-shared -o "$out" .
          ls -la ../dist
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: release + registry
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate registry.json
        run: bash scripts/gen-registry.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      - name: Commit registry.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp registry.json /tmp/registry.json
          git checkout -- . 2>/dev/null || true
          cp /tmp/registry.json registry.json
          git add registry.json
          git commit -m "chore: update registry.json for ${GITHUB_REF_NAME}" || echo "no changes"
          git push origin main
